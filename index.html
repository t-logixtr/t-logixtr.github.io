<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Logix TR | Kayıt Terminali</title>
    <style>
        :root { --neon-green: #00ff41; --deep-black: #050505; }
        body { background: var(--deep-black); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .terminal { width: 90%; max-width: 600px; border: 1px solid #222; background: #0a0a0a; padding: 30px; box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); border-radius: 5px; }
        .header { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .logo { color: var(--neon-green); font-size: 2rem; font-weight: bold; letter-spacing: 5px; }
        .status-text { color: #555; font-size: 0.8rem; text-transform: uppercase; margin-top: 5px; }
        .description { color: #aaa; font-size: 0.9rem; line-height: 1.6; margin: 25px 0; }
        
        /* Form Alanı */
        .input-group { margin-top: 30px; }
        input[type="email"] { width: 100%; box-sizing: border-box; background: #111; border: 1px solid #333; padding: 15px; color: var(--neon-green); font-family: inherit; font-size: 1rem; border-radius: 3px; outline: none; margin-bottom: 15px; }
        input[type="email"]:focus { border-color: var(--neon-green); }
        .btn { width: 100%; background: var(--neon-green); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--neon-green); }
        
        .footer-links { margin-top: 30px; font-size: 0.7rem; color: #444; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div class="logo">T-LOGIX <span style="color:white">TR</span></div>
        <div class="status-text">SİSTEM: ÇEVRİMİÇİ <span class="blink">_</span></div>
    </div>

    <div class="description">
        > T-Logix Teknoloji Analiz Birimi'ne hoş geldiniz.<br>
        > En son donanım sızıntıları ve özel raporlar doğrudan e-posta adresinize iletilir.
    </div>

    <div class="input-group">
        <form action="mailto:tlogixtr.iletisim@gmail.com" method="post" enctype="text/plain">
            <input type="email" name="Abone_Email" placeholder="E-POSTA ADRESİNİZİ TANIMLAYIN..." required>
            <button type="submit" class="btn">BÜLTENE ABONE OL</button>
        </form>
    </div>

    <div class="footer-links">
        © 2026 T-LOGIX // APACHE LICENSE 2.0 // ANKARA MERKEZLİ OPERASYON
    </div>
</div>

</body>
</html>
