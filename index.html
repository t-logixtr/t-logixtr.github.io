<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Logix TR | Kayıt Terminali</title>
    <style>
        :root { --neon-green: #00ff41; --deep-black: #050505; }
        body { background: var(--deep-black); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .terminal { width: 95%; max-width: 550px; border: 1px solid #222; background: #0a0a0a; padding: 40px; box-shadow: 0 0 50px rgba(0, 255, 65, 0.1); border-radius: 8px; }
        .logo { color: var(--neon-green); font-size: 2.2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 5px; }
        .status { color: #555; font-size: 0.75rem; margin-bottom: 30px; letter-spacing: 1px; }
        .info { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-bottom: 35px; text-align: left; border-left: 2px solid var(--neon-green); padding-left: 15px; }
        .btn { display: inline-block; width: 100%; background: var(--neon-green); color: #000; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-decoration: none; border-radius: 4px; transition: 0.3s; font-family: inherit; text-transform: uppercase; }
        .btn:hover { background: #fff; box-shadow: 0 0 25px var(--neon-green); transform: translateY(-3px); }
        .footer { margin-top: 40px; font-size: 0.7rem; color: #333; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="logo">T-LOGIX <span style="color:white">TR</span></div>
    <div class="status">SİSTEM DURUMU: ŞİFRELİ ERİŞİM AKTİF</div>

    <div class="info">
        > ÖZEL ANALİZ BİRİMİNE GİRİŞ YAPMAK ÜZERESİNİZ.<br>
        > EN YENİ TEKNOLOJİ HABERLERİ DOĞRUDAN E-POSTA İLE İLETİLİR.
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSevsTZ4Y8E2gWBl9emM37vCCGdeO0dYkY-x3VRvNMP5NS2roA/viewform?usp=header" target="_blank" class="btn">
        TERMİNALE KAYIT OL
    </a>

    <div class="footer">
        © 2026 T-LOGIX TR // APACHE LICENSE 2.0 // GÜVENLİ BAĞLANTI
    </div>
</div>

</body>
</html>
